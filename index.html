<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Le Maillon Faible - Banque</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #0c1c2c;
      color: white;
      padding: 30px;
    }
    h1 {
      margin-bottom: 20px;
    }
    .display {
      font-size: 1.3rem;
      margin: 15px;
    }
    button {
      font-size: 1.1rem;
      padding: 10px 20px;
      margin: 8px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }
    .good { background-color: #28a745; color: white; }
    .bad { background-color: #dc3545; color: white; }
    .bank { background-color: #ffc107; color: black; }

    .echelle {
      margin-top: 30px;
      width: 220px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }
    .montant {
      padding: 6px 12px;
      border-radius: 5px;
      margin: 4px 0;
      font-weight: bold;
    }
    .actuel {
      background-color: #28a745;
      color: white;
    }
    .inactif {
      color: gray;
    }
  </style>
</head>
<body>
  <h1>💡 Le Maillon Faible - Système de Banque</h1>

  <div class="display">Gain en cours : <span id="currentGain">0</span> €</div>
  <div class="display">Cagnotte totale : <span id="totalBanked">0</span> €</div>

  <button class="good" onclick="bonneReponse()">✅ Bonne réponse</button>
  <button class="bad" onclick="mauvaiseReponse()">❌ Mauvaise réponse</button>
  <button class="bank" onclick="banquer()">💰 Banquer</button>

  <div class="echelle" id="echelle"></div>

  <script>
    const montants = [0, 50, 100, 200, 300, 400, 1000, 2000, 3000, 4000, 5000];
    let niveauActuel = 0;
    let gainEnCours = montants[niveauActuel]; // Initialisé au départ
    let cagnotteTotale = 0;

    function updateAffichage() {
      gainEnCours = montants[niveauActuel]; // 🔧 Assure que le montant en cours est toujours mis à jour
      document.getElementById("currentGain").textContent = gainEnCours;
      document.getElementById("totalBanked").textContent = cagnotteTotale;
      updateEchelle();
    }

    function updateEchelle() {
      const container = document.getElementById("echelle");
      container.innerHTML = "";
      for (let i = montants.length - 1; i >= 0; i--) {
        const montant = montants[i];
        const div = document.createElement("div");
        div.className = "montant";

        if (i === niveauActuel) {
          div.classList.add("actuel");
        } else {
          div.classList.add("inactif");
        }

        div.textContent = montant + " €";
        container.appendChild(div);
      }
    }

    function bonneReponse() {
      if (niveauActuel + 1 < montants.length) {
        niveauActuel++;
      }
      updateAffichage();
    }

    function mauvaiseReponse() {
      niveauActuel = 0;
      updateAffichage();
    }

    function banquer() {
      if (gainEnCours > 0) {
        cagnotteTotale += gainEnCours;
        niveauActuel = 0;
        updateAffichage();
      }
    }

    updateAffichage();
  </script>
</body>
</html>
